services:
  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    volumes:
      - cache-core-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  admin-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin-api
    env_file:
      - .env.example
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3040:3040"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3040/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  cache-core-redis:
