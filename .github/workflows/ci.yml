name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".env.example"
      - ".node-version"
      - ".npmrc"
      - "biome.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.app.json"
      - "tsconfig.base.json"
      - "tsconfig.package.json"
      - "turbo.json"
      - "vitest.workspace.ts"
      - "packages/**"
      - "apps/admin-api/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".env.example"
      - ".node-version"
      - ".npmrc"
      - "biome.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.app.json"
      - "tsconfig.base.json"
      - "tsconfig.package.json"
      - "turbo.json"
      - "vitest.workspace.ts"
      - "packages/**"
      - "apps/admin-api/**"
      - "tests/**"

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Quality checks
        run: pnpm run ci
